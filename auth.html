<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | AI Analyzer</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <div class="auth-logo">
                        <span class="logo-icon">AI</span>
                        AI Analyzer
                    </div>
                    <h1>Добро пожаловать</h1>
                    <p>Войдите или создайте аккаунт для работы с системой</p>
                </div>

                <div class="auth-tabs">
                    <button class="auth-tab active" data-tab="login">Вход</button>
                    <button class="auth-tab" data-tab="register">Регистрация</button>
                </div>

                <div class="auth-error" id="authError"></div>

                <!-- Login Form -->
                <form class="auth-form active" id="loginForm" autocomplete="off">
                    <div class="form-group">
                        <label for="loginUsername">Имя пользователя</label>
                        <input type="text" id="loginUsername" placeholder="Введите имя пользователя" required>
                    </div>
                    <div class="form-group">
                        <label for="loginPassword">Пароль</label>
                        <div class="password-wrapper">
                            <input type="password" id="loginPassword" placeholder="Введите пароль" required>
                            <button type="button" class="password-toggle" onclick="togglePassword('loginPassword', this)">👁</button>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-accent" id="loginBtn">
                        <span class="btn-text">Войти</span>
                        <span class="spinner" style="display:none"></span>
                    </button>
                </form>

                <!-- Register Form -->
                <form class="auth-form" id="registerForm" autocomplete="off">
                    <div class="form-group">
                        <label for="regUsername">Имя пользователя</label>
                        <input type="text" id="regUsername" placeholder="Придумайте имя пользователя" required>
                    </div>
                    <div class="form-group">
                        <label for="regEmail">Email</label>
                        <input type="email" id="regEmail" placeholder="Введите email" required>
                    </div>
                    <div class="form-group">
                        <label for="regPassword">Пароль</label>
                        <div class="password-wrapper">
                            <input type="password" id="regPassword" placeholder="Придумайте пароль (минимум 6 символов)" required>
                            <button type="button" class="password-toggle" onclick="togglePassword('regPassword', this)">👁</button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="regConfirm">Подтвердите пароль</label>
                        <div class="password-wrapper">
                            <input type="password" id="regConfirm" placeholder="Повторите пароль" required>
                            <button type="button" class="password-toggle" onclick="togglePassword('regConfirm', this)">👁</button>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-accent" id="registerBtn">
                        <span class="btn-text">Создать аккаунт</span>
                        <span class="spinner" style="display:none"></span>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
