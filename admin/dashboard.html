<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Admin Panel</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/admin/css/admin.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
    <header class="header" id="header">
        <div class="header-inner">
            <button class="admin-mobile-toggle" id="mobileMenuToggle" onclick="toggleMobileSidebar()">&#9776;</button>
            <a href="/" class="logo">
                <span class="logo-icon">AI</span>
                AI Analyzer
            </a>
            <nav class="nav">
                <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle theme">&#9790;</button>
                <div class="nav-user" id="navUser">
                    <div class="profile-trigger" id="profileTrigger" onclick="toggleProfileDropdown(event)">
                        <span class="user-avatar">A</span>
                        <span class="user-name">Admin</span>
                        <svg class="chevron-down" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                    </div>
                    <div class="profile-dropdown" id="profileDropdown">
                        <div class="dropdown-header">
                            <span class="dropdown-avatar">A</span>
                            <div class="dropdown-user-info">
                                <span class="dropdown-username" id="dropdownUsername">Admin</span>
                                <span class="dropdown-email" id="dropdownEmail">admin@mail.com</span>
                            </div>
                        </div>
                        <div class="dropdown-divider"></div>
                        <a href="/profile.html" class="dropdown-item">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                            Profile
                        </a>
                        <a href="/dashboard.html" class="dropdown-item">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                            Dashboard
                        </a>
                        <button class="dropdown-item dropdown-logout" onclick="handleLogout()">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                            Sign Out
                        </button>
                    </div>
                </div>
            </nav>
        </div>
    </header>

    <div class="admin-layout">
        <div class="admin-sidebar-overlay" id="sidebarOverlay" onclick="toggleMobileSidebar()"></div>
        <aside class="admin-sidebar" id="adminSidebar">
            <div class="admin-sidebar-brand">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20V10"/><path d="M18 20V4"/><path d="M6 20v-4"/></svg>
                Admin Panel
            </div>
            <nav class="admin-sidebar-nav">
                <a href="/admin/dashboard.html" class="admin-nav-item active" data-page="dashboard">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                    Dashboard
                </a>
                <a href="/admin/users.html" class="admin-nav-item" data-page="users">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                    Users
                </a>
                <a href="/admin/roles.html" class="admin-nav-item" data-page="roles">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                    Roles & Permissions
                </a>
                <a href="/admin/messages.html" class="admin-nav-item" data-page="messages">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                    Messages
                </a>
                <a href="/admin/activity.html" class="admin-nav-item" data-page="activity">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
                    Activity Logs
                </a>
                <a href="/admin/settings.html" class="admin-nav-item" data-page="settings">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                    Settings
                </a>
            </nav>
            <div class="admin-sidebar-footer">
                <a href="/" class="admin-nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                    Back to Site
                </a>
            </div>
        </aside>

        <main class="admin-main" id="adminMain">
            <div class="admin-header">
                <div>
                    <h1>Dashboard</h1>
                    <p>Overview of your application performance</p>
                </div>
                <div class="admin-header-actions">
                    <button class="btn btn-accent" onclick="loadDashboard()">&#8635; Refresh</button>
                </div>
            </div>

            <div id="statsGrid" class="admin-stats-grid"></div>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px">
                <div class="admin-card">
                    <div class="admin-card-header"><h3>Daily Messages</h3></div>
                    <div class="admin-card-body"><canvas id="dailyChart" height="200"></canvas></div>
                </div>
                <div class="admin-card">
                    <div class="admin-card-header"><h3>Sentiment Distribution</h3></div>
                    <div class="admin-card-body"><canvas id="sentimentChart" height="200"></canvas></div>
                </div>
            </div>

            <div class="admin-card">
                <div class="admin-card-header">
                    <h3>Recent Activity</h3>
                    <a href="/admin/activity.html" class="btn btn-outline" style="padding:6px 14px;font-size:13px">View All</a>
                </div>
                <div class="admin-card-body" id="recentActivity">
                    <div class="admin-loading"><div class="spinner dark"></div><p>Loading activity...</p></div>
                </div>
            </div>
        </main>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="/js/api.js"></script>
    <script src="/admin/js/admin-utils.js"></script>
    <script src="/admin/js/admin-api.js"></script>
    <script src="/admin/js/admin-components.js"></script>
    <script src="/admin/js/admin-dashboard.js"></script>
</body>
</html>
