<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roles & Permissions | Admin Panel</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/admin/css/admin.css">
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <button class="admin-mobile-toggle" onclick="toggleMobileSidebar()">&#9776;</button>
            <a href="/" class="logo"><span class="logo-icon">AI</span>AI Analyzer</a>
            <nav class="nav">
                <button class="theme-toggle" onclick="toggleTheme()">&#9790;</button>
                <div class="nav-user" id="navUser">
                    <div class="profile-trigger" onclick="toggleProfileDropdown(event)">
                        <span class="user-avatar">A</span>
                        <span class="user-name">Admin</span>
                        <svg class="chevron-down" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                    </div>
                    <div class="profile-dropdown" id="profileDropdown">
                        <div class="dropdown-header">
                            <span class="dropdown-avatar">A</span>
                            <div class="dropdown-user-info">
                                <span class="dropdown-username">Admin</span>
                                <span class="dropdown-email">admin@mail.com</span>
                            </div>
                        </div>
                        <div class="dropdown-divider"></div>
                        <a href="/profile.html" class="dropdown-item">Profile</a>
                        <button class="dropdown-item dropdown-logout" onclick="handleLogout()">Sign Out</button>
                    </div>
                </div>
            </nav>
        </div>
    </header>

    <div class="admin-layout">
        <div class="admin-sidebar-overlay" id="sidebarOverlay" onclick="toggleMobileSidebar()"></div>
        <aside class="admin-sidebar" id="adminSidebar">
            <div class="admin-sidebar-brand"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20V10"/><path d="M18 20V4"/><path d="M6 20v-4"/></svg>Admin Panel</div>
            <nav class="admin-sidebar-nav">
                <a href="/admin/dashboard.html" class="admin-nav-item">Dashboard</a>
                <a href="/admin/users.html" class="admin-nav-item">Users</a>
                <a href="/admin/roles.html" class="admin-nav-item active">Roles & Permissions</a>
                <a href="/admin/messages.html" class="admin-nav-item">Messages</a>
                <a href="/admin/activity.html" class="admin-nav-item">Activity Logs</a>
                <a href="/admin/settings.html" class="admin-nav-item">Settings</a>
            </nav>
            <div class="admin-sidebar-footer">
                <a href="/" class="admin-nav-item">Back to Site</a>
            </div>
        </aside>

        <main class="admin-main">
            <div class="admin-header">
                <div>
                    <h1>Roles & Permissions</h1>
                    <p>Manage role-based access control</p>
                </div>
            </div>

            <div id="rolesContent"></div>
        </main>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="/js/api.js"></script>
    <script src="/admin/js/admin-utils.js"></script>
    <script src="/admin/js/admin-api.js"></script>
    <script src="/admin/js/admin-components.js"></script>
    <script src="/admin/js/admin-roles.js"></script>
</body>
</html>
