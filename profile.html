<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль | AI Analyzer</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/profile.css">
</head>
<body>
    <header class="header" id="header">
        <div class="header-inner">
            <a href="/" class="logo">
                <span class="logo-icon">AI</span>
                AI Analyzer
            </a>
            <nav class="nav">
                <a href="/" class="nav-link">Главная</a>
                <a href="/dashboard.html" class="nav-link">Аналитика</a>
                <div class="nav-user" id="navUser">
                    <a href="/auth.html" class="nav-link" id="authLink">Войти</a>
                    <div class="profile-trigger" id="profileTrigger" onclick="toggleProfileDropdown(event)">
                        <span class="user-avatar"></span>
                        <span class="user-name"></span>
                        <svg class="chevron-down" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                    </div>
                    <div class="profile-dropdown" id="profileDropdown">
                        <div class="dropdown-header">
                            <span class="dropdown-avatar"></span>
                            <div class="dropdown-user-info">
                                <span class="dropdown-username" id="dropdownUsername"></span>
                                <span class="dropdown-email" id="dropdownEmail"></span>
                            </div>
                        </div>
                        <div class="dropdown-divider"></div>
                        <a href="/profile.html" class="dropdown-item">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                            Профиль
                        </a>
                        <a href="/profile.html" class="dropdown-item">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                            Настройки аккаунта
                        </a>
                        <a href="/profile.html#password" class="dropdown-item">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                            Сменить пароль
                        </a>
                        <div class="dropdown-divider"></div>
                        <button class="dropdown-item dropdown-logout" onclick="handleLogout()">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                            Выйти
                        </button>
                    </div>
                </div>
            </nav>
        </div>
    </header>

    <main class="main-content">
        <div class="profile-page">
            <div class="profile-container">
                <div class="profile-side">
                    <div class="profile-card profile-summary">
                        <div class="profile-avatar-large" id="profileAvatarLarge"></div>
                        <h2 id="profileName"></h2>
                        <p id="profileEmailDisplay"></p>
                        <div class="profile-meta">
                            <div class="meta-item">
                                <span class="meta-label">Зарегистрирован</span>
                                <span class="meta-value" id="profileJoined">—</span>
                            </div>
                            <div class="meta-item">
                                <span class="meta-label">ID</span>
                                <span class="meta-value" id="profileId">—</span>
                            </div>
                        </div>
                    </div>
                    <div class="profile-card profile-nav-card">
                        <button class="profile-nav-item active" data-section="general">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                            Основные
                        </button>
                        <button class="profile-nav-item" data-section="password">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                            Сменить пароль
                        </button>
                    </div>
                </div>

                <div class="profile-main">
                    <div class="profile-card">
                        <div class="profile-section active" id="sectionGeneral">
                            <div class="section-header">
                                <h3>Основные настройки</h3>
                                <p>Обновите имя пользователя и email</p>
                            </div>
                            <form id="profileForm" autocomplete="off">
                                <div class="form-group">
                                    <label for="editUsername">Имя пользователя</label>
                                    <input type="text" id="editUsername" placeholder="Имя пользователя" required minlength="3">
                                </div>
                                <div class="form-group">
                                    <label for="editEmail">Email</label>
                                    <input type="email" id="editEmail" placeholder="Email" required>
                                </div>
                                <div class="form-actions">
                                    <button type="button" class="btn btn-outline" onclick="resetProfileForm()">Отмена</button>
                                    <button type="submit" class="btn btn-accent" id="saveProfileBtn">
                                        <span class="btn-text">Сохранить изменения</span>
                                        <span class="spinner" style="display:none"></span>
                                    </button>
                                </div>
                            </form>
                        </div>

                        <div class="profile-section" id="sectionPassword">
                            <div class="section-header">
                                <h3>Сменить пароль</h3>
                                <p>Используйте надёжный пароль для защиты аккаунта</p>
                            </div>
                            <form id="passwordForm" autocomplete="off">
                                <div class="form-group">
                                    <label for="currentPassword">Текущий пароль</label>
                                    <input type="password" id="currentPassword" placeholder="Введите текущий пароль" required>
                                </div>
                                <div class="form-group">
                                    <label for="newPassword">Новый пароль</label>
                                    <input type="password" id="newPassword" placeholder="Минимум 6 символов" required minlength="6">
                                    <div class="password-strength" id="passwordStrength">
                                        <div class="strength-bar" id="strengthBar"></div>
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label for="confirmNewPassword">Подтверждение нового пароля</label>
                                    <input type="password" id="confirmNewPassword" placeholder="Повторите новый пароль" required minlength="6">
                                </div>
                                <div class="form-actions">
                                    <button type="button" class="btn btn-outline" onclick="resetPasswordForm()">Отмена</button>
                                    <button type="submit" class="btn btn-accent" id="changePasswordBtn">
                                        <span class="btn-text">Изменить пароль</span>
                                        <span class="spinner" style="display:none"></span>
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="toast-container" id="toastContainer"></div>

    <script src="js/api.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>
